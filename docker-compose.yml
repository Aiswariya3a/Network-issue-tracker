version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nims_backend
    env_file:
      - .env
    volumes:
      - ./issues.db:/app/issues.db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: nims_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
