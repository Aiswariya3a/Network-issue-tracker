version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nims_backend
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nims_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-npt_db}
      POSTGRES_USER: ${POSTGRES_USER:-npt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-npt_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: nims_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
